<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DealFlow — CRM Kanban</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --col-new: #3b82f6;
    --col-progress: #f59e0b;
    --col-success: #10b981;
    --col-failure: #ef4444;
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated mesh background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(59,130,246,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 90% 80%, rgba(16,185,129,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(245,158,11,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app-wrapper { position: relative; z-index: 1; }

  /* Header */
  .header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(11,15,26,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span { color: #f59e0b; -webkit-text-fill-color: #f59e0b; }

  .header-right { display: flex; gap: 0.75rem; align-items: center; }

  .btn-add {
    display: flex; align-items: center; gap: 0.5rem;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
    border: none;
    padding: 0.6rem 1.25rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(59,130,246,0.3);
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.45); }
  .btn-add:active { transform: translateY(0); }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
    padding: 1.75rem 2rem;
    min-height: calc(100vh - 74px);
    align-items: start;
  }

  /* Column */
  .column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.3s;
    display: flex;
    flex-direction: column;
  }

  .column-header {
    padding: 1rem 1.25rem 0.875rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .column-title {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.875rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .col-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }

  .col-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
  }

  .col-new .col-dot    { color: #3b82f6; background: #3b82f6; }
  .col-progress .col-dot { color: #f59e0b; background: #f59e0b; }
  .col-success .col-dot  { color: #10b981; background: #10b981; }
  .col-failure .col-dot  { color: #ef4444; background: #ef4444; }

  .col-new .column-title    { color: #60a5fa; }
  .col-progress .column-title { color: #fbbf24; }
  .col-success .column-title  { color: #34d399; }
  .col-failure .column-title  { color: #f87171; }

  /* Column top accent bar */
  .column::before {
    content: '';
    display: block;
    height: 3px;
    width: 100%;
  }
  .col-new::before    { background: linear-gradient(90deg, #3b82f6, #6366f1); }
  .col-progress::before { background: linear-gradient(90deg, #f59e0b, #ef4444); }
  .col-success::before  { background: linear-gradient(90deg, #10b981, #06b6d4); }
  .col-failure::before  { background: linear-gradient(90deg, #ef4444, #7c3aed); }

  /* Cards area */
  .cards-area {
    padding: 0.875rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    min-height: 120px;
    transition: background 0.2s;
  }

  .cards-area.drag-over {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 1.5rem 1rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
    opacity: 0.6;
    pointer-events: none;
  }
  .empty-state svg { opacity: 0.4; }

  /* Card */
  .deal-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    cursor: grab;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .deal-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    opacity: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
    transition: opacity 0.2s;
  }

  .deal-card:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .deal-card:hover::after { opacity: 1; }
  .deal-card:active { cursor: grabbing; transform: scale(0.98); opacity: 0.85; }
  .deal-card.dragging { opacity: 0.4; transform: scale(0.97); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 0.35rem;
    line-height: 1.35;
  }

  .card-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 0.75rem;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-tag {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.2rem 0.55rem;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
  }

  .tag-new      { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .tag-progress { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .tag-success  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
  .tag-failure  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

  .card-actions { display: flex; gap: 0.4rem; }

  .card-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.7rem;
  }
  .card-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: rgba(255,255,255,0.15); }
  .card-btn.del:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: #141d2e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2rem;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s;
  }

  .modal-overlay.active .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .form-group { margin-bottom: 1.1rem; }

  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.7rem 0.9rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    transition: border-color 0.2s;
    outline: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: rgba(59,130,246,0.5);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: #141d2e; }

  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }

  .btn-cancel {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.6rem 1.2rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

  .btn-save {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none;
    color: white;
    padding: 0.6rem 1.4rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(59,130,246,0.3);
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(59,130,246,0.4); }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  /* Success flash overlay */
  .flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
  }

  .flash-success { background: radial-gradient(ellipse at center, rgba(16,185,129,0.25) 0%, transparent 70%); }
  .flash-failure { background: radial-gradient(ellipse at center, rgba(239,68,68,0.3) 0%, transparent 70%); }

  /* Shake animation for failure column */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-8px) rotate(-1deg); }
    30% { transform: translateX(8px) rotate(1deg); }
    45% { transform: translateX(-6px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
    90% { transform: translateX(4px); }
  }

  @keyframes glow-failure {
    0%,100% { box-shadow: none; }
    50% { box-shadow: 0 0 40px rgba(239,68,68,0.5), inset 0 0 30px rgba(239,68,68,0.1); }
  }

  .col-failure.shaking {
    animation: shake 0.55s ease, glow-failure 0.55s ease;
  }

  /* Flash keyframe */
  @keyframes flash-in-out {
    0% { opacity: 0; }
    25% { opacity: 1; }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }

  .flash-anim { animation: flash-in-out 0.7s ease forwards; }

  /* Card enter animation */
  @keyframes card-in {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-entering { animation: card-in 0.28s ease forwards; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 0.65rem 1.25rem;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 500;
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 560px) {
    .board { grid-template-columns: 1fr; padding: 1rem; }
    .header { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="app-wrapper">
  <!-- Header -->
  <header class="header">
    <div class="logo">Deal<span>Flow</span></div>
    <div class="header-right">
      <span id="total-count" style="color:var(--muted);font-size:0.8rem;"></span>
      <button class="btn-add" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New Deal
      </button>
    </div>
  </header>

  <!-- Board -->
  <main class="board" id="board">
    <div class="column col-new" id="col-new" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'new')">
      <div class="column-header">
        <div class="column-title"><span class="col-dot"></span>New</div>
        <span class="col-count" id="count-new">0</span>
      </div>
      <div class="cards-area" id="cards-new"></div>
    </div>

    <div class="column col-progress" id="col-progress" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'progress')">
      <div class="column-header">
        <div class="column-title"><span class="col-dot"></span>In Progress</div>
        <span class="col-count" id="count-progress">0</span>
      </div>
      <div class="cards-area" id="cards-progress"></div>
    </div>

    <div class="column col-success" id="col-success" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'success')">
      <div class="column-header">
        <div class="column-title"><span class="col-dot"></span>Success</div>
        <span class="col-count" id="count-success">0</span>
      </div>
      <div class="cards-area" id="cards-success"></div>
    </div>

    <div class="column col-failure" id="col-failure" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'failure')">
      <div class="column-header">
        <div class="column-title"><span class="col-dot"></span>Failure</div>
        <span class="col-count" id="count-failure">0</span>
      </div>
      <div class="cards-area" id="cards-failure"></div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add New Deal</div>
    <div class="form-group">
      <label class="form-label">Deal Title *</label>
      <input class="form-input" id="input-title" type="text" placeholder="e.g. Acme Corp — Enterprise Plan" maxlength="80"/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="input-desc" placeholder="Brief details about this deal…" maxlength="200"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Column</label>
      <select class="form-select" id="input-col">
        <option value="new">New</option>
        <option value="progress">In Progress</option>
        <option value="success">Success</option>
        <option value="failure">Failure</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="modal-save-btn" onclick="saveModal()">Add Deal</button>
    </div>
  </div>
</div>

<!-- Flash overlay -->
<div class="flash-overlay flash-success" id="flash-success"></div>
<div class="flash-overlay flash-failure" id="flash-failure"></div>

<!-- Confetti canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
let deals = [];
let editId = null;
let dragId = null;

const COLS = ['new','progress','success','failure'];

function loadDeals() {
  try { deals = JSON.parse(localStorage.getItem('dealflow_deals') || '[]'); } catch { deals = []; }
}
function saveDeals() {
  localStorage.setItem('dealflow_deals', JSON.stringify(deals));
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ─── Render ───────────────────────────────────────────────────────────────────
const tagLabel = { new:'New', progress:'In Progress', success:'Success', failure:'Failure' };
const tagClass  = { new:'tag-new', progress:'tag-progress', success:'tag-success', failure:'tag-failure' };

function render() {
  COLS.forEach(col => {
    const area = document.getElementById('cards-' + col);
    const colDeals = deals.filter(d => d.col === col);
    document.getElementById('count-' + col).textContent = colDeals.length;

    area.innerHTML = '';

    if (colDeals.length === 0) {
      area.innerHTML = `<div class="empty-state">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M9 12h6M12 9v6"/></svg>
        <span>Drop deals here</span>
      </div>`;
      return;
    }

    colDeals.forEach(d => {
      const card = document.createElement('div');
      card.className = 'deal-card card-entering';
      card.draggable = true;
      card.dataset.id = d.id;
      card.innerHTML = `
        <div class="card-title">${esc(d.title)}</div>
        ${d.desc ? `<div class="card-desc">${esc(d.desc)}</div>` : ''}
        <div class="card-footer">
          <span class="card-tag ${tagClass[d.col]}">${tagLabel[d.col]}</span>
          <div class="card-actions">
            <button class="card-btn" title="Edit" onclick="editCard('${d.id}')">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button class="card-btn del" title="Delete" onclick="deleteCard('${d.id}')">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>`;
      card.addEventListener('dragstart', e => { dragId = d.id; setTimeout(() => card.classList.add('dragging'), 0); });
      card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragId = null; });
      area.appendChild(card);
    });
  });

  // total count
  document.getElementById('total-count').textContent = `${deals.length} deal${deals.length !== 1 ? 's' : ''}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Drag & Drop ──────────────────────────────────────────────────────────────
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.querySelector('.cards-area').classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.querySelector('.cards-area').classList.remove('drag-over');
}
function onDrop(e, col) {
  e.preventDefault();
  e.currentTarget.querySelector('.cards-area').classList.remove('drag-over');
  if (!dragId) return;
  const deal = deals.find(d => d.id === dragId);
  if (!deal || deal.col === col) return;
  const prevCol = deal.col;
  deal.col = col;
  saveDeals();
  render();
  if (col === 'success') { triggerSuccess(); }
  if (col === 'failure') { triggerFailure(); }
  if (col !== prevCol && col !== 'success' && col !== 'failure') { playMoveSound(); }
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(col = 'new') {
  editId = null;
  document.getElementById('modal-title').textContent = 'Add New Deal';
  document.getElementById('modal-save-btn').textContent = 'Add Deal';
  document.getElementById('input-title').value = '';
  document.getElementById('input-desc').value = '';
  document.getElementById('input-col').value = col;
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('input-title').focus(), 150);
}

function editCard(id) {
  const d = deals.find(x => x.id === id);
  if (!d) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit Deal';
  document.getElementById('modal-save-btn').textContent = 'Save Changes';
  document.getElementById('input-title').value = d.title;
  document.getElementById('input-desc').value = d.desc || '';
  document.getElementById('input-col').value = d.col;
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('input-title').focus(), 150);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveModal() {
  const title = document.getElementById('input-title').value.trim();
  if (!title) { document.getElementById('input-title').focus(); return; }
  const desc = document.getElementById('input-desc').value.trim();
  const col = document.getElementById('input-col').value;

  if (editId) {
    const d = deals.find(x => x.id === editId);
    if (d) { d.title = title; d.desc = desc; d.col = col; }
    showToast('Deal updated ✏️');
    playEditSound();
  } else {
    deals.push({ id: genId(), title, desc, col, created: Date.now() });
    showToast('Deal added 🚀');
    playAddSound();
    if (col === 'success') { triggerSuccess(); }
    if (col === 'failure') { triggerFailure(); }
  }

  saveDeals();
  render();
  closeModal();
}

function deleteCard(id) {
  deals = deals.filter(d => d.id !== id);
  saveDeals();
  render();
  playDeleteSound();
  showToast('Deal removed 🗑️');
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('active')) {
    if (document.activeElement.tagName !== 'TEXTAREA') saveModal();
  }
});

// ─── Sound Engine (Web Audio API) ────────────────────────────────────────────
let audioCtx;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, vol=0.18, start=0) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
  gain.gain.setValueAtTime(vol, ctx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
  osc.start(ctx.currentTime + start);
  osc.stop(ctx.currentTime + start + duration);
}

function playAddSound() {
  playTone(440, 'sine', 0.15, 0.2);
  playTone(550, 'sine', 0.15, 0.2, 0.08);
  playTone(660, 'sine', 0.18, 0.2, 0.16);
}

function playDeleteSound() {
  playTone(440, 'sawtooth', 0.08, 0.12);
  playTone(300, 'sawtooth', 0.12, 0.12, 0.07);
  playTone(200, 'sawtooth', 0.15, 0.1, 0.14);
}

function playEditSound() {
  playTone(500, 'sine', 0.1, 0.15);
  playTone(600, 'sine', 0.1, 0.15, 0.09);
}

function playMoveSound() {
  playTone(380, 'sine', 0.08, 0.1);
  playTone(480, 'sine', 0.08, 0.1, 0.07);
}

function playSuccessSound() {
  // Bright celebratory chord
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.5, 0.18, i * 0.07));
  setTimeout(() => { [784, 1047, 1175].forEach((f,i) => playTone(f, 'sine', 0.4, 0.14, i*0.06)); }, 400);
}

function playFailureSound() {
  // Descending dissonant tones
  playTone(300, 'sawtooth', 0.2, 0.2);
  playTone(240, 'sawtooth', 0.2, 0.2, 0.1);
  playTone(180, 'sawtooth', 0.25, 0.2, 0.22);
  playTone(120, 'sawtooth', 0.15, 0.25, 0.38);
}

// ─── Reactions ────────────────────────────────────────────────────────────────
function triggerSuccess() {
  playSuccessSound();
  launchConfetti();
  const el = document.getElementById('flash-success');
  el.classList.remove('flash-anim');
  void el.offsetWidth;
  el.classList.add('flash-anim');
}

function triggerFailure() {
  playFailureSound();
  const col = document.getElementById('col-failure');
  col.classList.remove('shaking');
  void col.offsetWidth;
  col.classList.add('shaking');
  const el = document.getElementById('flash-failure');
  el.classList.remove('flash-anim');
  void el.offsetWidth;
  el.classList.add('flash-anim');
  setTimeout(() => col.classList.remove('shaking'), 600);
}

// ─── Confetti ─────────────────────────────────────────────────────────────────
let confettiAnim;
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#f0abfc'];
  const pieces = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 200,
    r: 4 + Math.random() * 7,
    d: Math.random() * Math.PI * 2,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speed: 2.5 + Math.random() * 4,
    drift: (Math.random() - 0.5) * 2,
    rot: (Math.random() - 0.5) * 0.15,
    opacity: 1,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    w: 6 + Math.random() * 10,
    h: 5 + Math.random() * 5
  }));

  if (confettiAnim) cancelAnimationFrame(confettiAnim);

  let tick = 0;
  function draw() {
    tick++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    pieces.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.d += p.rot;
      if (tick > 90) p.opacity -= 0.018;
      if (p.y < canvas.height && p.opacity > 0) alive++;

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.d);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
    if (alive > 0) confettiAnim = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
